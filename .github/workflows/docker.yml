name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build client
        run: dotnet build OrbitBreak.Client/OrbitBreak.Client.csproj -c Release

      - name: Run tests
        run: dotnet test OrbitBreak.Tests/OrbitBreak.Tests.csproj -c Release

  push-image:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: OrbitBreak.Client/Dockerfile
          push: true
          tags: ghcr.io/alon-shviki/orbit-break-client:latest
